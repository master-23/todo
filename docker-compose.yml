services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: task_manager_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./logs:/var/www/html/logs
    environment:
      - PHP_INI_SCAN_DIR=/usr/local/etc/php/conf.d
    networks:
      - task_manager_network
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: task_manager_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - task_manager_network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: task_manager_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: task_manager
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: task_user
      MYSQL_PASSWORD: task_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/sql/init:/docker-entrypoint-initdb.d
      - ./docker/sql/conf:/etc/mysql/conf.d  # Дополнительная конфигурация
    networks:
      - task_manager_network
    command: --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --init-connect='SET NAMES utf8mb4'
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: task_manager_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
      UPLOAD_LIMIT: 100M
    ports:
      - "8081:80"
    networks:
      - task_manager_network
    depends_on:
      - db

  test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: task_manager_test
    restart: "no"
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - task_manager_network
    depends_on:
      db:
        condition: service_healthy
    environment:
      - PHP_INI_SCAN_DIR=/usr/local/etc/php/conf.d
      - DB_HOST=db
      - DB_NAME=task_manager_test
      - DB_USER=task_user
      - DB_PASSWORD=task_password
    command: ["php", "vendor/bin/phpunit", "--colors=always"]
    # command: ["php", "-i"]

volumes:
  db_data:

networks:
  task_manager_network:
    driver: bridge